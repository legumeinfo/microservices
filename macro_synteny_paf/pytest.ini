[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (slower, may use Docker)
    slow: Slow tests (>1s)
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=macro_synteny_paf
    --cov-report=term-missing
    --cov-report=html
