syntax = "proto3";

package legumeinfo.microservices.block.v1;


message Blocks {
  string chromosome = 1;
  string genus = 2;
  string species = 3;
  repeated Block blocks = 4;
  optional uint32 chromosomeLength = 5;  // Length of target chromosome in base pairs
}

message Block {
  uint32 i = 1;
  uint32 j = 2;
  uint32 fmin = 3;
  uint32 fmax = 4;
  string orientation = 5;
  repeated float optionalMetrics = 6;
  optional string queryGeneName = 7;  // Name of query gene at index i
  optional uint32 queryGeneFmin = 8;  // Query gene start position
  optional uint32 queryGeneFmax = 9;  // Query gene end position
  optional float identity = 10;  // Identity score (0.0-1.0) if requested
}
