syntax = "proto3";

package legumeinfo.microservices.block.v1;


message Blocks {
  string chromosome = 1;
  string genus = 2;
  string species = 3;
  repeated Block blocks = 4;
}

message Block {
  uint32 i = 1;
  uint32 j = 2;
  uint32 fmin = 3;
  uint32 fmax = 4;
  string orientation = 5;
  repeated float optionalMetrics = 6;
  // Fields 7-9 reserved for queryGeneName, queryGeneFmin, queryGeneFmax (used by macro_synteny_blocks)
  optional float identity = 10;  // Identity score (0.0-1.0) if requested
}
